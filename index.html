<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Truth or Dare Game</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Truth or Dare Game</h1>

    <div class="card">

        <h2 id="output">
            Click a button to start
        </h2>

        <div class="buttons">

            <button onclick="showTruth()">
                Truth
            </button>

            <button onclick="showDare()">
                Dare
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
